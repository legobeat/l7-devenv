---
services:
  desktop:
    depends_on:
      - build-desktop
      - dns
      - http-proxy
    profiles:
      - desktop
      - nvim
      - podman
      - alpine
      - vnc
    image: 'localhost/l7/dev-shell:vnc'
    build:
      x-build-images:
        - 'localhost/l7/nvim:podman-remote-vnc'
      context: .
      dockerfile: imags/dev-shell/Containerfile
      args:
        BASE_IMAGE: 'localhost/l7/nvim:podman-remote-vnc'
      tags:
        - 'localhost/l7/dev-shell:vnc'
        - 'localhost/l7/dev-shell:vnc-nvim'
        - 'localhost/l7/vnc:latest'
    hostname: dev
    restart: always
    user: '1000:1000'
    userns_mode: 'keep-id:uid=1000,gid=1000'
    networks:
      internal:
      container-control:
      vnc:
        ipv4_address: 10.7.9.10
    entrypoint:
      - '/usr/local/bin/vncserver-start'
    working_dir: "${SRC_DIR:-${L7_SRC_DIR:-/src}}"
    # TODO: mounts for config could be done as configs
    # https://github.com/compose-spec/compose-spec/blob/master/08-configs.md
    volumes:
      # todo: move shared vncpasswd file out of here
      #- 'user_local:/home/user/.local'
      - '${LOCAL_DIR:-${HOME}/.local/share/l7ide/local}:/home/user/.local'
      - '${CONF_DIR:-${HOME}/.config/l7ide/config}/ssh.d:/home/user/.ssh/config.d:ro'
      - '${CONF_DIR:-${HOME}/.config/l7ide/config}/git:/home/user/.config/git:ro'
      - '${SRC_DIR:-${L7_SRC_DIR:-${PWD}}}:${SRC_DIR:-${L7_SRC_DIR:-${PWD}}}:rshared,nosuid'
      - '${SRC_DIR:-${L7_SRC_DIR:-${PWD}}}:/src:rshared,nosuid'
      - 'nvim_state:/home/user/.local/state/nvim:z'
      - 'cache_node_yarn_berry:/home/node/.yarn/cache/berry:z,ro'
      - 'cache_node_yarn_classic:/home/node/.cache/yarn:z,ro'
      - 'cache_node_pnpm:/home/node/.cache/pnpm:z,ro'
      - 'cache_node_npm:/home/node/.npm/_cacache:z,ro'
      - target: /tmp
        type: tmpfs
        tmpfs:
          size: 2G
          mode: 0777
      - '${SSH_SOCKET:-${SSH_AUTH_SOCK:-/dev/null}}:/home/user/.ssh/SSH_AUTH_SOCK'
      # ugly hack around compose insisting on overriding DNS:
      # https://github.com/docker/compose/issues/2847
      # obviates need for custom entrypoint at cost of hardcoding DNS IP
      - './compose/mounts/resolv-internal.conf:/etc/resolv.conf:ro'
    #configs:
    #  - source: resolv_conf_internal
    #    target:   /etc/myresolv.conf
    #    uid: '0'
    #    gid: '0'
    env_file:
      - path: env
        required: false
      - path: "${HOME}/.config/l7ide/config/env"
        required: false
    environment:
      CONTAINER_DNS:     '${CONTAINER_DNS:-10.7.8.133}'
      CONTAINER_HOST:    'tcp://10.7.9.2:2375'
      GO_RUNNER_IMAGE:   'localhost/l7/go:1.20-bookworm'
      GPG_IMAGE:         'localhost/l7/gpg-vault:pk'
      NODE_RUNNER_IMAGE: 'localhost/l7/node'
      L7_NODE_VERSION:   '20'
      HOME:    /home/user
      SRC_DIR: '${SRC_DIR:-${L7_SRC_DIR:-/src}}'
      L7_NVIM_STATE_PATH:  'l7_nvim_state'
      L7_NPM_CACHE_VOLUME:  'l7_cache_node_npm'
      L7_PNPM_CACHE_VOLUME: 'l7_cache_node_pnpm'
      L7_YARN_BERRY_CACHE_VOLUME:   'l7_cache_node_yarn_berry'
      L7_YARN_CLASSIC_CACHE_VOLUME: 'l7_cache_node_yarn_classic'
      GPG_PK_VOLUME: 'l7_gpgvault_pk'
      L7_COMPOSE_NETWORK_NAME_INTERNAL: 'l7_dev_internal'
      SSH_AUTH_SOCK: '/home/user/.ssh/SSH_AUTH_SOCK'
    dns: '${CONTAINER_DNS:-10.7.8.133}'
    ports:
      # vnc
      - '5902:5902'

########

networks:
  vnc:
    name: l7_dev_vnc
    attachable: true
    ipam:
      config:
        - subnet: 10.7.9.8/29
          ip_range: 10.7.9.12/30
    driver: bridge
    driver_opts:
      inhibit_ipv4: 1
      disable_dns: 1
